[build]
  command   = "npm run build"
  publish   = "dist/voting/browser"

[build.environment]
  NODE_VERSION = "20"

# ─── API Proxy ────────────────────────────────────────────────────────────────
# All /api/* requests are proxied to the Railway backend.
# This eliminates CORS entirely — browser only talks to Netlify.
# Set API_URL in Netlify dashboard → Environment Variables
# e.g. https://web-production-a0d8df.up.railway.app

[[redirects]]
  from   = "/api/*"
  to     = "https://web-production-a0d8df.up.railway.app/:splat"
  status = 200
  force  = true

# SPA fallback — all other routes serve index.html so Angular Router works
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
